<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian · дизайн-референс: список покупок</title>
<link rel="stylesheet" href="../../tailwind.css">
<link rel="icon" type="image/png" href="../../icons/icon-192.png">
</head>
<body class="m-0 flex justify-center bg-page p-6 font-sans text-content">
  <div class="w-80 rounded-3xl border border-line bg-app p-4">

    <div class="mb-0.5 flex items-center justify-between">
      <span class="text-lg font-medium text-content">Список покупок</span>
      <span class="text-xs text-accent">оновити</span>
    </div>
    <p class="mt-0 mb-3.5 text-xs text-muted">Тиждень 19–25 лип · обидва профілі</p>

    <div class="mb-2 text-xs tracking-wider text-subtle">ОВОЧІ ТА ЗЕЛЕНЬ</div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="flex h-5 w-5 items-center justify-center rounded-md border border-success bg-success text-xs text-app">&#10003;</span>
      <span class="flex-1 text-sm text-subtle line-through">Помідори</span>
      <span class="text-sm text-subtle">6 шт</span>
    </div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="h-5 w-5 rounded-md border border-line"></span>
      <span class="flex-1 text-sm text-content">Огірки</span>
      <span class="text-sm text-muted">5 шт</span>
    </div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="h-5 w-5 rounded-md border border-line"></span>
      <span class="flex-1 text-sm text-content">Салат листовий</span>
      <span class="text-sm text-muted">2 пуч</span>
    </div>

    <div class="mt-3.5 mb-2 text-xs tracking-wider text-subtle">М'ЯСО ТА РИБА</div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="flex h-5 w-5 items-center justify-center rounded-md border border-success bg-success text-xs text-app">&#10003;</span>
      <span class="flex-1 text-sm text-subtle line-through">Куряче філе</span>
      <span class="text-sm text-subtle">1.2 кг</span>
    </div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="h-5 w-5 rounded-md border border-line"></span>
      <span class="flex-1 text-sm text-content">Тунець консервований</span>
      <span class="text-sm text-muted">3 бан</span>
    </div>

    <div class="mt-3.5 mb-2 text-xs tracking-wider text-subtle">КРУПИ ТА МАКАРОНИ</div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="h-5 w-5 rounded-md border border-line"></span>
      <span class="flex-1 text-sm text-content">Гречка</span>
      <span class="text-sm text-muted">800 г</span>
    </div>
    <div class="flex items-center gap-2.5 py-2">
      <span class="h-5 w-5 rounded-md border border-line"></span>
      <span class="flex-1 text-sm text-content">Рис</span>
      <span class="text-sm text-muted">500 г</span>
    </div>

    <div class="mt-4 flex items-center justify-between border-t border-line pt-3">
      <div class="relative mr-3 h-1.5 flex-1 rounded-sm bg-line">
        <div class="absolute top-0 left-0 h-1.5 w-2/5 rounded-sm bg-success"></div>
      </div>
      <span class="text-xs text-muted">12 з 28 куплено</span>
    </div>

  </div>
</body>
</html>
