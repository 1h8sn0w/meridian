<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian · дизайн-референс: профіль на двох</title>
<link rel="stylesheet" href="../../tailwind.css">
<link rel="icon" type="image/png" href="../../icons/icon-192.png">
</head>
<body class="m-0 bg-page p-6 font-sans text-content">
  <div class="flex flex-wrap justify-center gap-4">

    <div class="w-72 rounded-3xl border border-line bg-app p-4">
      <div class="mb-3 flex items-center justify-between">
        <span class="text-lg font-medium text-content">Meridian</span>
        <span class="text-xs text-muted">нд, 19 лип</span>
      </div>

      <div class="mb-2 flex gap-2 rounded-2xl border border-line bg-surface p-1.5">
        <div class="flex flex-1 items-center gap-2 rounded-xl px-2 py-2">
          <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-blue-soft text-xs font-medium text-accent">В</div>
          <div><div class="text-xs text-muted">Володимир</div><div class="text-xs text-subtle">1900 ккал</div></div>
        </div>
        <div class="flex flex-1 items-center gap-2 rounded-xl border border-profile-pink bg-profile-pink-soft px-2 py-2">
          <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-profile-pink-deep text-xs font-medium text-profile-pink">Д</div>
          <div><div class="text-xs font-medium text-content">Дружина</div><div class="text-xs text-profile-pink">1500 ккал</div></div>
        </div>
      </div>

      <div class="mb-3 mt-1.5 flex justify-center">
        <svg viewBox="0 0 180 180" width="146" height="146">
          <circle cx="90" cy="90" r="66" fill="none" stroke="#2a2f3a" stroke-width="12"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#46c98b" stroke-width="12" stroke-linecap="round" stroke-dasharray="70 344" stroke-dashoffset="-6" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#e0729c" stroke-width="15" stroke-linecap="round" stroke-dasharray="88 326" stroke-dashoffset="-84" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#d8674f" stroke-width="12" stroke-linecap="round" stroke-dasharray="70 344" stroke-dashoffset="-188" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#7f77dd" stroke-width="12" stroke-linecap="round" stroke-dasharray="34 380" stroke-dashoffset="-270" transform="rotate(-90 90 90)"/>
          <text x="90" y="84" text-anchor="middle" font-size="11" fill="#9aa2b1">Зараз</text>
          <text x="90" y="102" text-anchor="middle" font-size="17" font-weight="500" fill="#e7e9ee">Обід</text>
          <text x="90" y="118" text-anchor="middle" font-size="10" fill="#5f6675">до 15:00</text>
        </svg>
      </div>

      <div class="rounded-xl border border-profile-pink bg-surface p-3">
        <div class="mb-1 flex items-center justify-between">
          <span class="text-xs text-profile-pink">Активний прийом · Дружина</span>
          <span class="text-xs text-muted">430 ккал</span>
        </div>
        <div class="text-base font-medium text-content">Салат з тунцем</div>
        <div class="mt-0.5 text-xs text-muted">Б 32 · Ж 18 · В 22 · з плану №1</div>
      </div>
    </div>

    <div class="w-72 rounded-3xl border border-line bg-app p-4">
      <div class="mb-3.5 flex items-center justify-between">
        <span class="text-base font-medium text-content">Редагування · Дружина</span>
      </div>

      <div class="mb-3.5 flex items-center gap-2.5">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-profile-pink-deep text-base font-medium text-profile-pink">Д</div>
        <div class="flex-1 rounded-lg border border-line bg-surface px-2.5 py-2.5 text-sm text-content">Дружина</div>
      </div>

      <div class="mb-1.5 text-xs text-subtle">КОЛІР ПРОФІЛЮ</div>
      <div class="mb-3.5 flex gap-2.5">
        <div class="h-7 w-7 rounded-full bg-accent"></div>
        <div class="h-7 w-7 rounded-full bg-profile-pink ring-2 ring-profile-pink ring-offset-2 ring-offset-app"></div>
        <div class="h-7 w-7 rounded-full bg-success"></div>
        <div class="h-7 w-7 rounded-full bg-warning"></div>
        <div class="h-7 w-7 rounded-full bg-violet"></div>
      </div>

      <div class="mb-3 flex gap-2">
        <div class="flex-1"><label class="text-xs text-muted">Ціль, ккал</label><div class="mt-1 rounded-lg border border-line bg-surface px-2.5 py-2.5 text-sm text-content">1500</div></div>
        <div class="flex-1"><label class="text-xs text-muted">Коридор, ±</label><div class="mt-1 rounded-lg border border-line bg-surface px-2.5 py-2.5 text-sm text-content">100</div></div>
      </div>

      <div class="mb-1.5 text-xs text-subtle">ЦІЛІ БЖВ · НЕОБОВ'ЯЗКОВО</div>
      <div class="mb-3.5 flex gap-1.5">
        <div class="flex-1 rounded-lg border border-line bg-surface p-2 text-center"><div class="text-xs text-muted">Б</div><div class="text-sm text-content">110</div></div>
        <div class="flex-1 rounded-lg border border-line bg-surface p-2 text-center"><div class="text-xs text-muted">Ж</div><div class="text-sm text-content">50</div></div>
        <div class="flex-1 rounded-lg border border-line bg-surface p-2 text-center"><div class="text-xs text-muted">В</div><div class="text-sm text-content">140</div></div>
      </div>

      <div class="flex items-center justify-between border-t border-line pt-2.5">
        <span class="text-sm text-content">Свій пул страв</span>
        <span class="text-xs text-muted">спільний</span>
      </div>
    </div>

  </div>
</body>
</html>
