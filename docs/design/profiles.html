<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian · дизайн-референс: профіль на двох</title>
<style>
  body { margin:0; background:#0b0d11; color:#e7e9ee; font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; padding:24px; }
  .row { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; }
</style>
</head>
<body>
  <div class="row">

    <div style="width:300px; background:#0f1115; border:1px solid #2a2f3a; border-radius:24px; padding:16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <span style="font-size:18px; font-weight:500; color:#e7e9ee;">Meridian</span>
        <span style="font-size:12px; color:#9aa2b1;">нд, 19 лип</span>
      </div>

      <div style="display:flex; gap:8px; background:#1a1d24; border:1px solid #2a2f3a; border-radius:14px; padding:5px; margin-bottom:8px;">
        <div style="flex:1; display:flex; align-items:center; gap:7px; border-radius:10px; padding:7px 8px;">
          <div style="width:24px; height:24px; border-radius:50%; background:#15243b; color:#4f9dff; font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center;">В</div>
          <div><div style="font-size:12px; color:#9aa2b1;">Володимир</div><div style="font-size:10px; color:#5f6675;">1900 ккал</div></div>
        </div>
        <div style="flex:1; display:flex; align-items:center; gap:7px; background:#2e1622; border:1px solid #e0729c; border-radius:10px; padding:7px 8px;">
          <div style="width:24px; height:24px; border-radius:50%; background:#3d1c2c; color:#e0729c; font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center;">Д</div>
          <div><div style="font-size:12px; color:#e7e9ee; font-weight:500;">Дружина</div><div style="font-size:10px; color:#e0729c;">1500 ккал</div></div>
        </div>
      </div>

      <div style="display:flex; justify-content:center; margin:6px 0 12px;">
        <svg viewBox="0 0 180 180" width="146" height="146">
          <circle cx="90" cy="90" r="66" fill="none" stroke="#2a2f3a" stroke-width="12"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#46c98b" stroke-width="12" stroke-linecap="round" stroke-dasharray="70 344" stroke-dashoffset="-6" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#e0729c" stroke-width="15" stroke-linecap="round" stroke-dasharray="88 326" stroke-dashoffset="-84" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#d8674f" stroke-width="12" stroke-linecap="round" stroke-dasharray="70 344" stroke-dashoffset="-188" transform="rotate(-90 90 90)"/>
          <circle cx="90" cy="90" r="66" fill="none" stroke="#7f77dd" stroke-width="12" stroke-linecap="round" stroke-dasharray="34 380" stroke-dashoffset="-270" transform="rotate(-90 90 90)"/>
          <text x="90" y="84" text-anchor="middle" font-size="11" fill="#9aa2b1">Зараз</text>
          <text x="90" y="102" text-anchor="middle" font-size="17" font-weight="500" fill="#e7e9ee">Обід</text>
          <text x="90" y="118" text-anchor="middle" font-size="10" fill="#5f6675">до 15:00</text>
        </svg>
      </div>

      <div style="background:#1a1d24; border:1px solid #e0729c; border-radius:12px; padding:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <span style="font-size:11px; color:#e0729c;">Активний прийом · Дружина</span>
          <span style="font-size:12px; color:#9aa2b1;">430 ккал</span>
        </div>
        <div style="font-size:15px; color:#e7e9ee; font-weight:500;">Салат з тунцем</div>
        <div style="font-size:12px; color:#9aa2b1; margin-top:2px;">Б 32 · Ж 18 · В 22 · з плану №1</div>
      </div>
    </div>

    <div style="width:300px; background:#0f1115; border:1px solid #2a2f3a; border-radius:24px; padding:16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <span style="font-size:16px; font-weight:500; color:#e7e9ee;">Редагування · Дружина</span>
      </div>

      <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
        <div style="width:40px; height:40px; border-radius:50%; background:#3d1c2c; color:#e0729c; font-size:15px; font-weight:500; display:flex; align-items:center; justify-content:center;">Д</div>
        <div style="flex:1; background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:9px 10px; font-size:13px; color:#e7e9ee;">Дружина</div>
      </div>

      <div style="font-size:11px; color:#5f6675; margin-bottom:6px;">КОЛІР ПРОФІЛЮ</div>
      <div style="display:flex; gap:10px; margin-bottom:14px;">
        <div style="width:26px; height:26px; border-radius:50%; background:#4f9dff;"></div>
        <div style="width:26px; height:26px; border-radius:50%; background:#e0729c; box-shadow:0 0 0 2px #0f1115, 0 0 0 4px #e0729c;"></div>
        <div style="width:26px; height:26px; border-radius:50%; background:#46c98b;"></div>
        <div style="width:26px; height:26px; border-radius:50%; background:#ffb454;"></div>
        <div style="width:26px; height:26px; border-radius:50%; background:#7f77dd;"></div>
      </div>

      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <div style="flex:1;"><label style="font-size:12px; color:#9aa2b1;">Ціль, ккал</label><div style="background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:9px 10px; margin-top:4px; font-size:13px; color:#e7e9ee;">1500</div></div>
        <div style="flex:1;"><label style="font-size:12px; color:#9aa2b1;">Коридор, ±</label><div style="background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:9px 10px; margin-top:4px; font-size:13px; color:#e7e9ee;">100</div></div>
      </div>

      <div style="font-size:11px; color:#5f6675; margin-bottom:6px;">ЦІЛІ БЖВ · НЕОБОВ'ЯЗКОВО</div>
      <div style="display:flex; gap:6px; margin-bottom:14px;">
        <div style="flex:1; background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#9aa2b1;">Б</div><div style="font-size:13px; color:#e7e9ee;">110</div></div>
        <div style="flex:1; background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#9aa2b1;">Ж</div><div style="font-size:13px; color:#e7e9ee;">50</div></div>
        <div style="flex:1; background:#1a1d24; border:1px solid #2a2f3a; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#9aa2b1;">В</div><div style="font-size:13px; color:#e7e9ee;">140</div></div>
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid #2a2f3a;">
        <span style="font-size:13px; color:#e7e9ee;">Свій пул страв</span>
        <span style="font-size:12px; color:#9aa2b1;">спільний</span>
      </div>
    </div>

  </div>
</body>
</html>
